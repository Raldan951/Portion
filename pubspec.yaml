name: portion
description: A free, local-first Bible reading and journaling companion
publish_to: 'none'

version: 1.0.0+40

environment:
  sdk: '^3.11.0'      # This is the missing line (matches your Dart 3.11.4)

dependencies:
  flutter:
    sdk: flutter

  # Add these as we go (you can add them now or later)
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.0
  share_plus: ^10.0.0
  flutter_tts: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/desk_texture.jpg
    - assets/images/desk_texture1.jpg
    - assets/images/desk_texture2.jpg
    - assets/images/bg_Cats1.jpg
    - assets/images/bg_Cats2.jpg
    - assets/images/bg_Cats3.jpg
    - assets/images/AmerFlag.jpg
    - assets/images/aramaic2.jpg
    - assets/images/bjIcon.png
    - assets/plans/
    - assets/data/KJV.db
    - assets/data/BSB.db
    - assets/data/founding_docs.json

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/images/bjIcon.png"
  macos:
    generate: true
    image_path: "assets/images/bjIcon.png"